<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #f8f5f2; color: #333; padding: 24px; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; }
.container { max-width: 900px; width: 100%; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #5b4a3e; display: flex; align-items: center; gap: 12px; }
h1 a { font-size: 14px; font-weight: 500; color: #a28b7a; text-decoration: none; margin-left: auto; }
h1 a:hover { text-decoration: underline; }

.card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #5b4a3e; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #f0ece8; }
th { font-weight: 600; color: #8a7a6a; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
td { vertical-align: middle; }
td.ical { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: #666; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge.active { background: #d4edda; color: #155724; }
.badge.inactive { background: #f8d7da; color: #721c24; }
.badge.admin { background: #cce5ff; color: #004085; }
.actions { display: flex; gap: 6px; flex-wrap: wrap; }
.actions button { padding: 4px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; font-weight: 500; }
.actions button:hover { background: #f0ece8; }
.actions button.danger { color: #c0392b; border-color: #f5c6cb; }
.actions button.danger:hover { background: #f8d7da; }

form label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #5b4a3e; }
form input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; margin-bottom: 12px; font-family: inherit; }
form input:focus { outline: none; border-color: #a28b7a; box-shadow: 0 0 0 3px rgba(162,139,122,.15); }
.form-row { display: flex; gap: 12px; }
.form-row > div { flex: 1; }
.btn-primary { padding: 10px 24px; border: none; border-radius: 10px; background: #7c9a6e; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-primary:hover { background: #6b8b5e; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; }
#toast.show { opacity: 1; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
.modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.modal .btn-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.modal .btn-cancel { padding: 8px 20px; border: 1px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; font-size: 14px; }

.empty { text-align: center; color: #999; padding: 30px 0; font-size: 14px; }

@media (max-width: 600px) {
  body { padding: 12px; }
  .card { padding: 16px; }
  .form-row { flex-direction: column; gap: 0; }
  table { font-size: 13px; }
  th, td { padding: 8px 4px; }
  td.ical { max-width: 100px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>⚙️ Panel de Control <a href="/" id="backLink">← Volver al calendario</a></h1>

  <div class="card">
    <h2>Crear usuario</h2>
    <form id="createForm">
      <div class="form-row">
        <div><label>Usuario</label><input id="newUser" required placeholder="ej: pepe"></div>
        <div><label>Contraseña</label><input id="newPass" type="text" required placeholder="mín 4 caracteres"></div>
      </div>
      <div><label>Nombre</label><input id="newName" required placeholder="Nombre completo"></div>
      <button type="submit" class="btn-primary">Crear usuario</button>
    </form>
  </div>

  <div class="card">
    <h2>Usuarios</h2>
    <div id="userList"><div class="empty">Cargando…</div></div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <form id="modalForm">
      <div id="modalBody"></div>
      <div class="btn-group">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn-primary" id="modalConfirm">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '/api/admin/users'
let token = ''
let currentUser = ''

function init() {
  token = localStorage.getItem('papalendar_token')
  currentUser = localStorage.getItem('papalendar_user') || ''
  if (!token) { window.location.href = '/login.html'; return }
  document.getElementById('backLink').href = currentUser === 'admin' ? '/' : '/'
  loadUsers()
}

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg; el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

async function apiFetch(url, opts) {
  opts = opts || {}
  opts.headers = opts.headers || {}
  opts.headers['Authorization'] = 'Bearer ' + token
  try {
    const r = await fetch(url, opts)
    const d = await r.json()
    if (!r.ok) throw new Error(d.error || 'Error')
    return d
  } catch (e) {
    toast('Error: ' + e.message)
    throw e
  }
}

async function loadUsers() {
  try {
    const list = await apiFetch(API)
    const tbody = document.getElementById('userList')
    if (!list.length) { tbody.innerHTML = '<div class="empty">No hay usuarios</div>'; return }

    tbody.innerHTML = `<table>
      <thead><tr>
        <th>Usuario</th><th>Nombre</th><th>Rol</th><th>Estado</th><th>iCal URL</th><th>Acciones</th>
      </tr></thead>
      <tbody>${list.map(u => `<tr>
        <td><strong>${esc(u.username)}</strong></td>
        <td>${esc(u.name)}</td>
        <td>${u.role === 'admin' ? '<span class="badge admin">Admin</span>' : '<span class="badge">Usuario</span>'}</td>
        <td><span class="badge ${u.active ? 'active' : 'inactive'}">${u.active ? 'Activo' : 'Inactivo'}</span></td>
        <td class="ical" title="${esc(u.icalUrl)}">${esc(u.icalUrl) || '—'}</td>
        <td class="actions">
          <button onclick="showChangePass('${esc(u.username)}')">🔑 Contraseña</button>
          ${u.role !== 'admin' ? `<button class="${u.active ? 'danger' : ''}" onclick="toggleUser('${esc(u.username)}', ${!u.active})">${u.active ? '❌ Desactivar' : '✅ Activar'}</button>` : ''}
        </td>
      </tr>`).join('')}</tbody>
    </table>`
  } catch (_) {}
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

// Create user
document.getElementById('createForm').addEventListener('submit', async e => {
  e.preventDefault()
  const username = document.getElementById('newUser').value.trim()
  const password = document.getElementById('newPass').value.trim()
  const name = document.getElementById('newName').value.trim()
  if (!username || !password || !name) { toast('Rellena todos los campos'); return }
  try {
    await apiFetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, name }) })
    toast('Usuario creado')
    document.getElementById('createForm').reset()
    loadUsers()
  } catch (_) {}
})

// Change password
function showChangePass(username) {
  document.getElementById('modalTitle').textContent = 'Cambiar contraseña: ' + username
  document.getElementById('modalBody').innerHTML = '<label>Nueva contraseña</label><input id="changePassInput" type="text" required minlength="4">'
  document.getElementById('modalConfirm').textContent = 'Guardar'
  document.getElementById('modal').classList.add('show')
  document.getElementById('modalForm').onsubmit = async e => {
    e.preventDefault()
    const pass = document.getElementById('changePassInput').value.trim()
    if (!pass || pass.length < 4) { toast('Mínimo 4 caracteres'); return }
    try {
      await apiFetch(API + '/' + encodeURIComponent(username), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pass }) })
      toast('Contraseña actualizada')
      closeModal()
    } catch (_) {}
  }
}

// Toggle active
async function toggleUser(username, active) {
  try {
    await apiFetch(API + '/' + encodeURIComponent(username), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ active }) })
    toast(active ? 'Usuario activado' : 'Usuario desactivado')
    loadUsers()
  } catch (_) {}
}

function closeModal() {
  document.getElementById('modal').classList.remove('show')
}

init()
</script>
</body>
</html>
